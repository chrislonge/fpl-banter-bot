services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fplbot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fplbanterbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fplbot -d fplbanterbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  # One-shot backfill service — not started by default.
  # Usage: docker compose run --rm backfill
  #
  # The "profiles" key means this service is excluded from a plain
  # `docker compose up`. You must either use `run` (which ignores
  # profiles) or `docker compose --profile tools up backfill`.
  backfill:
    build: .
    entrypoint: ["/backfill"]
    env_file: .env
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
